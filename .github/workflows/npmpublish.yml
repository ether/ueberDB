name: Node.js Package

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - v[0-9]+

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      # One DB failing should not cancel the other 9. Without this, every
      # PR ends up red even when only a single integration container is flaky.
      fail-fast: false
      matrix:
        db:
          [couch, dirty, elasticsearch, mongo, mysql, redis, mock, sqlite, memory, rusty, surrealdb]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm run test ${{ matrix.db }}

  publish-npm:
    if: github.event_name == 'push'
    needs:
      - test
    runs-on: ubuntu-latest
    # OIDC trusted publishing: npm exchanges the GitHub-issued `id-token`
    # for a short-lived publish credential at the registry, so there is no
    # stored NPM_TOKEN to expire or rotate. `contents: write` is needed for
    # the auto-bump commit + tag push.
    #
    # One-time setup on https://www.npmjs.com/package/ueberdb2/access:
    #   Trusted Publishers → Add → Provider: GitHub Actions
    #   Org: ether,  Repo: ueberDB,  Workflow filename: npmpublish.yml
    #   Environment: (blank)
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # This is required if the package has a prepare script that uses something
      # in dependencies or devDependencies. This is also needed for bumping the
      # version.
      - run: pnpm install --frozen-lockfile # Workaround based on https://github.com/pnpm/pnpm/issues/3141

      - name: Bump version (patch)
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0) || exit 1
          NEW_COMMITS=$(git rev-list --count "${LATEST_TAG}"..) || exit 1
          [ "${NEW_COMMITS}" -gt 0 ] || exit 0
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          pnpm version patch
          # Update the branch before pushing the tag in case the branch can't be
          # fast-forwarded.
          git push
          git push --follow-tags

      # `pnpm publish` must come after `git push` otherwise there is a race
      # condition: If two PRs are merged back-to-back then main will be
      # updated with the commits from the second PR before the first PR's
      # workflow has a chance to push the commit generated by `pnpm version
      # patch`. This causes the first PR's `git push` step to fail after the
      # package has already been published, which in turn will cause all future
      # workflow runs to fail because they will all attempt to use the same
      # already-used version number. By running `pnpm publish` after `git push`,
      # back-to-back merges will cause the first merge's workflow to fail but
      # the second's will succeed.
      - name: Convert typescript and create dist folder
        run: pnpm run build

      # pnpm 10.4+ auto-discovers the GHA OIDC token via `id-token: write`
      # and exchanges it with npm for a publish credential — no NPM_TOKEN
      # secret involved. `--provenance` attaches the signed-by-GitHub
      # attestation that npm shows on the package page.
      # `--no-git-checks` skips the "working tree dirty" guard, which would
      # otherwise trip on the version-bump commit that's already been pushed.
      - run: pnpm publish --no-git-checks --provenance
