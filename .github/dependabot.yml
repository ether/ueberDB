version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    versioning-strategy: "increase"
    # Wait until a release is at least 1 day old before opening an update PR.
    # This mirrors pnpm's `minimumReleaseAge` policy (default 24h): without it
    # Dependabot proposes brand-new versions whose lockfile entries pnpm then
    # rejects with ERR_PNPM_MINIMUM_RELEASE_AGE_VIOLATION (e.g. testcontainers@12.0.3).
    cooldown:
      default-days: 1
